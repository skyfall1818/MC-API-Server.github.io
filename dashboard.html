        font-size: 16px;

      body {
        font-weight: 400;

        text-decoration: none;
        text-transform: none;

      data-tag="font"
    />
    <link

      href="https://fonts.googleapis.com/css2?family=STIX+Two+Text:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&amp;display=swap"

      data-tag="font"
    />

      href="https://unpkg.com/@teleporthq/teleport-custom-scripts/dist/style.css"
    />

  <body>
    <link rel="stylesheet" href="pages/DBstyle.css" />
    <div>
      <link href="pages/DB.css" rel="stylesheet" />

      <div class="api-control-container1">
        <section class="api-control-panel">
          <div class="api-control-panel__container">
            <div class="api-control-panel__glass-card">
              <div class="api-control-panel__header">
                <h1 class="api-control-panel__title">API Control System</h1>
                <div class="api-control-panel__status-indicator">
                  <span id="status-pulse" class="api-control-panel__pulse"></span>
                  <span id="status-text" class="api-control-panel__status-text">
                    Loading...
                  </span>
                </div>
              </div>
              <div
                class="api-control-thq-api-control-panelgrid-elm api-control-panel__grid"
              >
                <div
                  class="api-control-panel__group api-control-panel__group--execution"
                >
                  <div class="api-control-panel__input-wrapper">
                    <select
                      id="game-list-dropdown"
                      aria-label="Select item to run"
                      class="api-control-panel__select"
                      style=" background-color:dimgray;"
                    >
                      <option value="0">Select Game</option>
                    </select>
                    <button
                      id="run-btn"
                      class="api-control-panel__btn api-control-panel__btn--run"
                    >
                      <span
                        id="icon-run"
                        class="api-control-panel__icon-placeholder"
                      ></span>
                      <span>Run</span>
                    </button>
                  </div>
                  <button
                    id="stop-btn"
                    class="api-control-panel__btn api-control-panel__btn--stop"
                  >
                    <span
                      id="icon-stop"
                      class="api-control-panel__icon-placeholder"
                    ></span>
                    <span>Stop</span>
                  </button>
                  <button
                    id="status-btn"
                    class="api-control-thq-api-control-panelbtn-elm6 api-control-panel__btn api-control-panel__btn--status"
                  >
                    <span
                      id="icon-status"
                      class="api-control-panel__icon-placeholder"
                    ></span>
                    <span>Status</span>
                  </button>
                </div>
                <div
                  class="api-control-panel__group api-control-panel__group--command"
                >
                  <div class="api-control-panel__input-wrapper">
                    <input
                      type="text"
                      id="command-input"
                      placeholder="Enter system command..."
                      class="api-control-panel__input"
                    />
                    <button
                      id="command-btn"
                      class="api-control-panel__btn api-control-panel__btn--cmd"
                    >
                      <span
                        id="icon-cmd"
                        class="api-control-panel__icon-placeholder"
                      ></span>
                      <span>Execute</span>
                    </button>
                  </div>
                </div>
                <br>
                <div class="api-control-container2">
                  <button
                    id="view-log-btn"
                    class="api-control-panel__btn api-control-panel__btn--log"
                  >
                    <span
                      id="icon-log"
                      class="api-control-panel__icon-placeholder"
                    ></span>
                    <span>View Log</span>
                  </button>
                </div>
                <button
                  id="ip-btn"
                  class="api-control-panel__btn api-control-panel__btn--ip"
                >
                  <span
                    id="icon-ip"
                    class="api-control-panel__icon-placeholder"
                  ></span>
                  <span>View IP Address</span>
                </button>
                <div class="api-control-panel__group">
                  <div class="api-control-panel__reveal-wrapper">
                    <div id="ip-display" class="api-control-panel__reveal-box">
                      <input
                        id="ip-text"
                        type="text"
                        readonly="true"
                        value="97.102.77.55"
                        class="api-control-panel__ip-text"
                      />
                    </div>
                  </div>
                </div>
                <button
                  id="reg-ip-btn"
                  class="api-control-thq-api-control-panelbtn-elm6 api-control-panel__btn api-control-panel__btn--register"
                >
                  <span
                    id="icon-ip"
                    class="api-control-panel__icon-placeholder"
                  ></span>
                  <span>Register IP</span>
                </button>
              </div>
            </div>
          </div>
        </section>
        <section class="output-console">
          <div class="output-console__container">
            <div class="output-console__window">
              <div class="output-console__header">
                <div class="output-console__dots">
                  <span></span>
                  <span></span>
                  <span></span>
                </div>
                <div class="output-console__title-box">
                  <span>System Output Console</span>
                </div>
                <div id="console-meta" class="output-console__meta">
                  <span>MESSAGE HEADER</span>
                </div>
              </div>
              <div id="console-scroller" class="output-console__scroller">
                <div class="output-console__line output-console__line--system">
                  <span>[SYSTEM] Initializing API Control GUI...</span>
                </div>
                <div class="output-console__line output-console__line--success">
                  <span>[SUCCESS] All modules loaded. Ready for input.</span>
                </div>
              </div>
            </div>
          </div>
        </section>
        <div class="api-control-container3">
          <div class="api-control-container4">
            <style>
                      @keyframes api-pulse {0%,100% {opacity: 1;
              transform: scale(1);}
              50% {opacity: 0.5;
              transform: scale(1.2);}}
            </style>
          </div>
        </div>
        <div class="api-control-container5">
          <div class="api-control-container6">
            <script src="pages/setup_run_list.js"></script>
            <script src="pages/sendMessage.js"></script>
            <script defer="" data-name="api-control-logic">
              (function(){
                document.addEventListener("DOMContentLoaded", () => {
                  const consoleScroller = document.getElementById("console-scroller")
                  const ipBtn = document.getElementById("ip-btn")
                  const ipDisplay = document.getElementById("ip-display")

                  // Icon Injection
                  const injectIcon = (id, iconName) => {
                    const el = document.getElementById(id)
                    if (el) {
                      // Using placeholder text since we don't have the icon tool active here
                      // but mimicking the structure for visual completeness
                      el.innerHTML = `<span style="font-size: 1.2em">⬢</span>`
                    }
                  }

                  // Log function
                  const logToConsole = (message, type = "system") => {
                    const line = document.createElement("div")
                    line.className = `output-console__line output-console__line--${type}`
                    const timestamp = new Date().toLocaleTimeString([], { hour12: false, hour: "2-digit", minute: "2-digit", second: "2-digit" })
                    line.innerHTML = `<span style="color: #475569">[${timestamp}]</span> ${message}`
                    consoleScroller.appendChild(line)
                    consoleScroller.scrollTop = consoleScroller.scrollHeight
                  }

                  // Button Listeners
                  document.getElementById("run-btn").addEventListener("click", () => {
                    const dropdown = document.getElementById("game-list-dropdown")
                    const item = dropdown.value
                    if (item == "0") {logToConsole(`Select a game from the dropdown menu.`, "info"); return; }
                    const name = dropdown.options[dropdown.selectedIndex].text
                    logToConsole(`Initializing execution for: ${name}...`, "info")
                    sendMessage('run ' + item);
                  })

                  document.getElementById("stop-btn").addEventListener("click", () => {
                    logToConsole("Stoping Mincecraft Server.", "error")
                    sendMessage('stop');
                  })

                  document.getElementById("status-btn").addEventListener("click", () => {
                    logToConsole("Retrieving server status...", "info")
                    sendMessage('status');
                  })

                  document.getElementById("command-btn").addEventListener("click", () => {
                    const cmd = document.getElementById("command-input").value
                    if (cmd.trim()) {
                      logToConsole(`Executing: ${cmd}`, "cmd")
                      document.getElementById("command-input").value = ""
                      sendMessage("command " + cmd);
                    }
                  })

                  ipBtn.addEventListener("click", () => {
                    ipDisplay.classList.toggle("active")
                    const isActive = ipDisplay.classList.contains("active")
                    logToConsole(isActive ? "IP Address revealed." : "IP Address hidden.", "system")
                  })

                  document.getElementById("view-log-btn").addEventListener("click", () => {
                    logToConsole("Fetching latest log entries from the server...", "info")
                    sendMessage('log');
                  })

                  // Handle Enter key on command input
                  document.getElementById("command-input").addEventListener("keypress", (e) => {
                    if (e.key === "Enter") {
                      document.getElementById("command-btn").click()
                    }
                  })

                  document.getElementById("reg-ip-btn").addEventListener("click", () => {
                    logToConsole("Requesting register the IP...", "info")
                    const out_req = sendRequest('register IP');
                    out_req.then((out_req) => {
                      if (out_req != ""){
                        logToConsole(out_req, "success")
                      }
                    })
                  })
                })
              })()
            </script>
            <script src="pages/constantReceiver.js"></script>
          </div>
        </div>
      </div>
      <link
        rel="canonical"
        href="https://grouchy-sunny-manatee-3f7ei4.teleporthq.app/"
      />
    </div>
  </body>
</html>
